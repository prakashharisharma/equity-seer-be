server:
  port: 8080

spring:
  application:
    name: equity-seer-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/equity_seer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  name: equity-seer

